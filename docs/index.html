<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CIZEN TECH</title>
  <link rel="icon" type="image/png" sizes="32x32" href="./img/cizentech-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  <style>
    /* ─── Variables ─── */
    :root {
      --bg:           #eef1f8;
      --surface:      #ffffff;
      --sidebar-bg:   #ffffff;
      --primary:      #4f46e5;
      --primary-lt:   #ede9fe;
      --primary-dk:   #3730a3;
      --sky:          #0ea5e9;
      --text-h:       #0f172a;
      --text-body:    #334155;
      --text-muted:   #64748b;
      --border:       #e2e8f0;
      --border-strong:#c7d2fe;
      --shadow-sm:    0 1px 3px rgba(15,23,42,.08), 0 1px 2px rgba(15,23,42,.05);
      --shadow-md:    0 4px 12px rgba(15,23,42,.10), 0 2px 4px rgba(15,23,42,.06);
      --shadow-lg:    0 12px 32px rgba(15,23,42,.12), 0 4px 8px rgba(15,23,42,.07);
      --sidebar-w:    280px;
      --radius:       10px;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    /* ─── Body ─── */
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif !important;
      background-color: #ffffff !important;
      color: var(--text-body) !important;
      overflow-x: hidden;
    }

    /* ─── Custom scrollbar ─── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #c7d2fe; border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

    /* ─── Sidebar ─── */
    .sidebar {
      background: var(--sidebar-bg) !important;
      border-right: 2px solid var(--border) !important;
      box-shadow: var(--shadow-md) !important;
      width: var(--sidebar-w) !important;
      position: relative;
      z-index: 10 !important;
    }

    /* Indigo accent stripe top of sidebar */
    .sidebar::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary) 0%, var(--sky) 100%);
    }

    /* Logo */
    .sidebar-logo {
      padding: 28px 20px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .sidebar-logo img {
      height: 64px;
      transition: transform 0.25s ease;
    }
    .sidebar-logo img:hover { transform: scale(1.04); }

    /* Nav */
    .sidebar-nav { padding: 16px 0 !important; }
    .sidebar-nav > ul { padding: 0 12px !important; }

    .sidebar-nav ul li {
      list-style: none !important;
      margin: 2px 0 !important;
    }

    .sidebar-nav ul li a {
      color: var(--text-muted) !important;
      font-size: 13.5px !important;
      font-weight: 500 !important;
      letter-spacing: 0.01em !important;
      padding: 8px 14px !important;
      border-radius: var(--radius) !important;
      display: block !important;
      text-decoration: none !important;
      transition: all 0.15s ease !important;
      border: 1px solid transparent !important;
    }

    .sidebar-nav ul li a:hover {
      color: var(--primary) !important;
      background: var(--primary-lt) !important;
      border-color: var(--border-strong) !important;
    }

    .sidebar-nav ul li.active > a,
    .sidebar-nav ul li a.active {
      color: var(--primary-dk) !important;
      background: var(--primary-lt) !important;
      border-color: var(--border-strong) !important;
      font-weight: 600 !important;
    }

    /* Active left accent bar */
    .sidebar-nav ul li.active > a::before,
    .sidebar-nav ul li a.active::before {
      content: '';
      display: inline-block;
      width: 3px; height: 12px;
      background: var(--primary);
      border-radius: 2px;
      margin-right: 8px;
      vertical-align: middle;
    }

    .sidebar-nav ul ul {
      padding-left: 10px !important;
      border-left: 2px solid var(--border) !important;
      margin-left: 16px !important;
      margin-top: 2px !important;
    }

    .sidebar-nav ul ul li a {
      font-size: 12.5px !important;
      padding: 5px 12px !important;
      font-weight: 400 !important;
    }

    /* ─── Content ─── */
    .content {
      background: transparent !important;
      position: relative;
      z-index: 1;
    }

    .markdown-section {
      max-width: 100% !important;
      margin: 0 !important;
      padding: 40px 52px !important;
      background: var(--surface) !important;
      border-radius: 0 !important;
      border: none !important;
      border-top: 3px solid var(--primary) !important;
      box-shadow: none !important;
      color: var(--text-body) !important;
    }

    /* ─── Typography ─── */
    .markdown-section h1,
    .markdown-section h2,
    .markdown-section h3,
    .markdown-section h4,
    .markdown-section h5,
    .markdown-section h6 {
      font-family: 'Inter', sans-serif !important;
      color: var(--text-h) !important;
      font-weight: 700 !important;
      letter-spacing: -0.025em !important;
      margin-top: 1.8em !important;
    }

    .markdown-section h1 {
      font-size: 2rem !important;
      border-bottom: 2px solid var(--border) !important;
      padding-bottom: 0.45em !important;
      margin-bottom: 1em !important;
    }

    /* Indigo accent left bar on h2 */
    .markdown-section h2 {
      font-size: 1.4rem !important;
      display: flex !important;
      align-items: center !important;
      gap: 10px !important;
      border-bottom: 1px solid var(--border) !important;
      padding-bottom: 0.4em !important;
    }
    .markdown-section h2::before {
      content: '';
      display: inline-block;
      width: 4px; height: 1.1em;
      background: linear-gradient(180deg, var(--primary), var(--sky));
      border-radius: 2px;
      flex-shrink: 0;
    }

    .markdown-section h3 {
      font-size: 1.1rem !important;
      color: var(--primary-dk) !important;
    }

    .markdown-section p {
      color: var(--text-body) !important;
      line-height: 1.8 !important;
      font-size: 14.5px !important;
    }

    .markdown-section strong {
      color: var(--text-h) !important;
      font-weight: 600 !important;
    }

    /* ─── Links ─── */
    .markdown-section a {
      color: var(--primary) !important;
      text-decoration: none !important;
      border-bottom: 1px solid rgba(79,70,229,.3) !important;
      font-weight: 500 !important;
      transition: all 0.15s !important;
    }
    .markdown-section a:hover {
      color: var(--primary-dk) !important;
      border-bottom-color: var(--primary) !important;
    }

    /* ─── Code ─── */
    .markdown-section code {
      font-family: 'JetBrains Mono', 'Fira Code', monospace !important;
      font-size: 0.83em !important;
      background: #f1f5ff !important;
      color: var(--primary-dk) !important;
      border: 1px solid var(--border-strong) !important;
      border-radius: 5px !important;
      padding: 2px 7px !important;
    }

    .markdown-section pre {
      background: #f8faff !important;
      border: 1px solid var(--border) !important;
      border-radius: var(--radius) !important;
      box-shadow: var(--shadow-sm) !important;
      border-left: 3px solid var(--primary) !important;
      position: relative;
    }

    .markdown-section pre code {
      background: transparent !important;
      border: none !important;
      color: #1e293b !important;
      font-size: 13px !important;
      padding: 0 !important;
    }

    /* ─── Tables ─── */
    .markdown-section table {
      border-collapse: collapse !important;
      width: 100% !important;
      border-radius: var(--radius) !important;
      overflow: hidden !important;
      border: 1px solid var(--border) !important;
      box-shadow: var(--shadow-sm) !important;
    }

    .markdown-section thead tr {
      background: linear-gradient(90deg, var(--primary) 0%, #6366f1 100%) !important;
    }

    .markdown-section thead th {
      color: #ffffff !important;
      font-weight: 600 !important;
      font-size: 12.5px !important;
      letter-spacing: 0.05em !important;
      text-transform: uppercase !important;
      padding: 12px 16px !important;
      border: none !important;
    }

    .markdown-section tbody tr {
      background: var(--surface) !important;
      transition: background 0.12s !important;
    }
    .markdown-section tbody tr:nth-child(even) {
      background: #f8f9ff !important;
    }
    .markdown-section tbody tr:hover {
      background: var(--primary-lt) !important;
    }

    .markdown-section tbody td {
      color: var(--text-body) !important;
      padding: 10px 16px !important;
      font-size: 13.5px !important;
      border: none !important;
      border-bottom: 1px solid var(--border) !important;
    }

    /* ─── Blockquotes ─── */
    .markdown-section blockquote {
      background: #f8f9ff !important;
      border-left: 4px solid var(--primary) !important;
      border-radius: 0 var(--radius) var(--radius) 0 !important;
      margin: 20px 0 !important;
      padding: 16px 20px !important;
      color: var(--text-muted) !important;
      box-shadow: var(--shadow-sm) !important;
    }
    .markdown-section blockquote p { color: var(--text-muted) !important; margin: 0 !important; }

    /* ─── Lists ─── */
    .markdown-section ul li,
    .markdown-section ol li {
      color: var(--text-body) !important;
      font-size: 14.5px !important;
      line-height: 1.75 !important;
      margin: 4px 0 !important;
    }
    .markdown-section ul li::marker { color: var(--primary) !important; }

    /* ─── HR ─── */
    .markdown-section hr {
      border: none !important;
      height: 1px !important;
      background: var(--border) !important;
      margin: 32px 0 !important;
    }

    /* ─── Images — keep white bg friendly ─── */
    .markdown-section img {
      border-radius: var(--radius) !important;
      border: 1px solid var(--border) !important;
      box-shadow: var(--shadow-md) !important;
      max-width: 100% !important;
      background: #fff !important;
    }

    /* ─── Sidebar toggle (mobile) ─── */
    .sidebar-toggle {
      background: var(--surface) !important;
      border: 1px solid var(--border) !important;
      box-shadow: var(--shadow-sm) !important;
    }
    .sidebar-toggle span { background-color: var(--primary) !important; }

    /* ─── Progress bar ─── */
    #nprogress .bar { background: var(--primary) !important; }

    /* ─── Responsive ─── */
    @media (max-width: 768px) {
      .markdown-section {
        margin: 12px !important;
        padding: 24px 18px !important;
        border-radius: var(--radius) !important;
      }
    }
  </style>
</head>
<body>
  <div id="app">Loading...</div>

  <script>
    window.$docsify = {
      name: '',
      subMaxLevel: 2,
      loadSidebar: true,
      plugins: [
        function(hook) {
          hook.ready(function() {
            var logo = document.createElement('div');
            logo.className = 'sidebar-logo';
            logo.innerHTML = '<a href="#/README"><img src="img/cizentech-logo-195x88-trans.png" alt="CIZEN TECH Logo"></a>';
            var sidebar = document.querySelector('.sidebar');
            if (sidebar) sidebar.insertBefore(logo, sidebar.firstChild);
          });
        }
      ]
    };
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
</body>
</html>
